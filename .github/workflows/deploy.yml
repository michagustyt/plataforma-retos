name: Deploy a la VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Actualizar código
        run: |
          cd /mnt/app/proyecto
          git pull origin main

      - name: Reconstruir contenedores
        run: |
          cd /mnt/app/proyecto
          docker compose up -d --build

      - name: Verificar despliegue
        run: |
          sleep 5
          curl -f http://localhost/health && echo "Despliegue exitoso: $(date)"
