services:

  # ─── NGINX: Proxy inverso + balanceador ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api
    restart: always

  # ─── API FastAPI: 3 réplicas ───────────────────────────────────
  api:
    build: ./api
    environment:
      - DATABASE_URL=postgresql://alumno:password@postgres_master:5432/retos_db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./api:/app
    depends_on:
      - postgres_master
      - redis
    restart: always
    deploy:
      replicas: 3

  # ─── REDIS: Cola de trabajos ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - /mnt/app/proyecto/redis_data:/data
    restart: always

  # ─── WORKER: Ejecuta el código de los usuarios ────────────────
  worker:
    build: ./workers
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always
    deploy:
      replicas: 2

  # ─── POSTGRESQL MASTER ────────────────────────────────────────
  postgres_master:
    image: bitnami/postgresql:latest
    container_name: postgres_master
    environment:
      - POSTGRESQL_USERNAME=alumno
      - POSTGRESQL_PASSWORD=password
      - POSTGRESQL_DATABASE=retos_db
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=replicator
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
    volumes:
      - /mnt/db_master:/bitnami/postgresql
    restart: always

  # ─── POSTGRESQL SLAVE ─────────────────────────────────────────
  postgres_slave:
    image: bitnami/postgresql:latest
    container_name: postgres_slave
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=postgres_master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_USER=replicator
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_PASSWORD=password
    volumes:
      - /mnt/db_slave:/bitnami/postgresql
    depends_on:
      - postgres_master
    restart: always

  # ─── NETDATA: Monitoreo ───────────────────────────────────────
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    ports:
      - "19999:19999"
    volumes:
      - /mnt/logs/netdata:/var/lib/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cap_add:
      - SYS_PTRACE
    restart: always
